<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Digitalizen — পুনঃনির্দেশ হচ্ছে...</title>
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    ═══════════════════════════════════════════════════════
    GitHub Pages BrowserRouter SPA Redirect

    GitHub Pages যেকোনো অমিলকৃত পাথের জন্য 404.html সার্ভ করে।
    এই স্ক্রিপ্টটি URL ক্যাপচার করে sessionStorage-এ রাখে,
    তারপর index.html-এ রিডাইরেক্ট করে যা URL প্রতিস্থাপন করে
    (কোনো 404 ফ্ল্যাশ ছাড়াই)।

    সূত্র: rafgraph.dev/blog/how-to-create-a-github-pages-spa
    ═══════════════════════════════════════════════════════
  -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1F4BFF;
      --blue-dark:  #1438CC;
      --blue-light: #E8EEFF;
      --blue-glow:  rgba(31, 75, 255, 0.15);
      --bg:         #F5F7FF;
      --bg2:        #EEF1FC;
      --white:      #FFFFFF;
      --text:       #0B1220;
      --muted:      #5A667A;
      --muted2:     #8A96AA;
      --border:     #E2E7F5;
      --dark:       #0B1220;
      --dark2:      #101828;
      --font:       'Noto Sans Bengali', sans-serif;
      --radius:     12px;
      --radius-sm:  8px;
      --shadow-blue: 0 8px 28px rgba(31, 75, 255, 0.22);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* dot-grid background — matches brand */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--border) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* top glow */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 340px;
      background: radial-gradient(ellipse, var(--blue-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(245, 247, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.06);
    }
    .navbar-logo {
      font-family: var(--font);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .navbar-badge {
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
    }

    /* main */
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 20px;
      text-align: center;
    }

    /* section-label — exact brand pattern */
    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s ease forwards;
    }
    .section-label::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--blue);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* big 404 */
    .big-404 {
      font-family: var(--font);
      font-size: clamp(6rem, 22vw, 15rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.55s 0.2s ease forwards;
      user-select: none;
    }
    .big-404 .zero {
      color: var(--blue);
      display: inline-block;
      animation: bobZero 3s ease-in-out infinite;
    }
    @keyframes bobZero {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .headline {
      font-family: var(--font);
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      font-weight: 700;
      color: var(--text);
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 0.5s 0.35s ease forwards;
    }

    .subtext {
      font-family: var(--font);
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--muted);
      margin-top: 8px;
      max-width: 360px;
      line-height: 1.85;
      opacity: 0;
      animation: fadeUp 0.5s 0.48s ease forwards;
    }

    /* dark panel — brand: Finder/modal */
    .progress-card {
      margin-top: 28px;
      background: var(--dark);
      border-radius: var(--radius);
      padding: 16px 20px;
      width: min(300px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.5s 0.62s ease forwards;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.14);
    }
    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .progress-title {
      font-family: var(--font);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted2);
    }
    .progress-dot {
      width: 8px;
      height: 8px;
      background: var(--blue);
      border-radius: 2px; /* square bullet — brand */
      animation: pulse 1s step-start infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--blue);
      border-radius: 100px;
      animation: loadBar 3.2s ease-out forwards;
    }
    @keyframes loadBar {
      0%   { width: 0%; }
      80%  { width: 92%; }
      100% { width: 100%; }
    }
    .progress-label {
      font-family: var(--font);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
  <script>
    var l = window.location;
    sessionStorage.setItem(
      'spa_redirect',
      l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash
    );
    setTimeout(function() {
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    }, 0);
  </script>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo">digitalizen</span>
    <span class="navbar-badge">404</span>
  </nav>

  <div class="container">
    <div class="section-label">Error Page</div>
    <div class="big-404">4<span class="zero">0</span>4</div>
    <div class="headline">পৃষ্ঠাটি খুঁজে পাওয়া যায়নি</div>
    <div class="subtext">
      আপনি যে পাতাটি খুঁজছেন সেটি সরানো হয়েছে বা আর বিদ্যমান নেই।<br>
      Digitalizen-এ ফিরিয়ে নিয়ে যাওয়া হচ্ছে…
    </div>
    <div class="progress-card">
      <div class="progress-top">
        <span class="progress-title">পুনঃনির্দেশ হচ্ছে</span>
        <div class="progress-dot"></div>
      </div>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <span class="progress-label">digitalizen.com-এ ফিরে যাচ্ছি...</span>
    </div>
  </div>

</body>
</html>
