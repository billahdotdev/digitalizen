<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=/" />
  <title>Digitalizen</title>
  <script>
    /* GitHub Pages SPA fallback.
       When user types digitalizen.com.bd/bot directly, GH Pages 404s.
       We stash the path then redirect to /, where index.html's restorer
       script reads sessionStorage and history.replaceState's it back. */
    (function () {
      var l = window.location;
      var path = l.pathname.slice(1) + l.search + l.hash;
      sessionStorage.setItem('spa_redirect', path);
      l.replace(l.protocol + '//' + l.host + '/');
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/">homepage</a>…</p>
</body>
</html>
