# ============================================================
# .github/workflows/deploy-github-pages.yml
#
# Digitalizen SPA — GitHub Pages Deploy
# ─────────────────────────────────────────────
# Pipeline:  lint → build → checks → deploy
# Trigger:   push to main + manual dispatch
# Node:      22 LTS (from .nvmrc)
#
# Project structure this workflow expects:
#   src/           React source (main.jsx, App.jsx, components/…)
#   public/        Static assets → copied verbatim to dist/
#   api/           Cloudflare Workers (NOT bundled by Vite)
#   index.html     Vite HTML entry
#   vite.config.js
#
# ONE-TIME SETUP:
# ─────────────────
# 1. Repo → Settings → Pages → Source: "GitHub Actions"
#    (NOT "Deploy from branch" — that mode ignores this workflow)
#
# 2. Custom domain:
#    Settings → Pages → Custom domain → digitalizen.billah.dev → Save
#
# 3. DNS at Cloudflare (DNS Only — grey cloud):
#    Type: CNAME | Name: digitalizen | Target: <username>.github.io
#
# 4. Tick "Enforce HTTPS" after TLS cert provisions (~10 min)
#
# REQUIRED SECRETS (for CAPI Workers only — not Pages deploy):
#   CLOUDFLARE_API_TOKEN   → Cloudflare Profile → API Tokens
#   CLOUDFLARE_ACCOUNT_ID  → Cloudflare dashboard sidebar
# ============================================================

name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:

  build:
    name: Lint · Build · Check · Upload
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node 22 LTS (reads .nvmrc)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — blocks deploy on any ESLint error
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── Post-build sanity checks ─────────────────────────
      - name: Verify dist/ output
        run: |
          set -e
          echo "── Checking required files ──"
          test -f dist/index.html    || (echo "❌ dist/index.html missing"  && exit 1)
          test -f dist/robots.txt    || (echo "❌ robots.txt missing"       && exit 1)
          test -f dist/sitemap.xml   || (echo "❌ sitemap.xml missing"      && exit 1)
          test -f dist/llms.txt      || (echo "❌ llms.txt missing"         && exit 1)
          test -f dist/sw.js         || (echo "❌ sw.js missing"            && exit 1)
          test -f dist/manifest.json || (echo "❌ manifest.json missing"    && exit 1)

          echo "── Checking index.html signals ──"
          grep -q 'application/ld+json'     dist/index.html || (echo "❌ No JSON-LD schema"     && exit 1)
          grep -q 'rel="canonical"'         dist/index.html || (echo "❌ No canonical tag"      && exit 1)
          grep -q 'og:image'                dist/index.html || (echo "❌ No og:image meta"      && exit 1)
          grep -q 'Content-Security-Policy' dist/index.html || (echo "❌ No CSP meta"           && exit 1)
          grep -q 'geo.region'              dist/index.html || (echo "❌ No GEO region tag"     && exit 1)
          grep -q 'ai-content-description'  dist/index.html || (echo "❌ No AEO meta tag"       && exit 1)
          grep -q 'MarketingAgency'         dist/index.html || (echo "❌ No agency schema"      && exit 1)

          echo "── Checking JS chunks ──"
          ls dist/assets/vendor-react-*.js    || (echo "❌ vendor-react chunk missing"    && exit 1)
          ls dist/assets/chunk-priority-*.js  || (echo "❌ chunk-priority chunk missing"  && exit 1)
          ls dist/assets/chunk-mid-*.js       || (echo "❌ chunk-mid chunk missing"       && exit 1)
          ls dist/assets/chunk-lower-*.js     || (echo "❌ chunk-lower chunk missing"     && exit 1)

          echo "✅ All checks passed"

      # ── CNAME: must be written AFTER build (Vite clears dist/) ──
      - name: Write CNAME for custom domain
        run: echo "digitalizen.billah.dev" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
