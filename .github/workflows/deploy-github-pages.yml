# ============================================================
# .github/workflows/deploy-github-pages.yml
#
# Digitalizen — GitHub Pages Production Deploy
# ─────────────────────────────────────────────
# Pipeline:  lint → build → seo-check → deploy
# Trigger:   push to main + manual dispatch
# Node:      from .nvmrc (22 LTS)
#
# ONE-TIME SETUP (before first push):
# ─────────────────────────────────────────────
# 1. GitHub repo → Settings → Pages
#       Source: "GitHub Actions"   ← NOT "Deploy from branch"
#
# 2. Custom domain:
#       Settings → Pages → Custom domain → digitalizen.billah.dev → Save
#
# 3. DNS at Cloudflare (DNS Only mode — grey cloud):
#       Type: CNAME | Name: digitalizen | Target: <username>.github.io
#
# 4. Tick "Enforce HTTPS" in Pages settings after cert provisions.
#
# NOTE ON HEADERS:
#   _headers file does NOT work on GitHub Pages.
#   Security headers (CSP, etc.) are set via <meta> in index.html.
#   If you migrate to Cloudflare Pages, _headers activates automatically.
#
# REQUIRED SECRETS: none — uses built-in GITHUB_TOKEN
# ============================================================

name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:

  build:
    name: Lint, Build & SEO Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node (reads .nvmrc)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── SEO sanity checks — catch regressions before deploy ──
      - name: SEO checks on dist/
        run: |
          echo "Checking critical SEO files..."

          # index.html must exist
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)

          # robots.txt must be served
          test -f dist/robots.txt || (echo "❌ robots.txt missing from dist/" && exit 1)

          # sitemap.xml must be served
          test -f dist/sitemap.xml || (echo "❌ sitemap.xml missing from dist/" && exit 1)

          # llms.txt must be present
          test -f dist/llms.txt || (echo "❌ llms.txt missing from dist/" && exit 1)

          # sw.js must be present for PWA
          test -f dist/sw.js || (echo "❌ sw.js missing from dist/" && exit 1)

          # Verify JSON-LD present in HTML
          grep -q 'application/ld+json' dist/index.html || (echo "❌ No JSON-LD in index.html" && exit 1)

          # Verify canonical tag
          grep -q 'rel="canonical"' dist/index.html || (echo "❌ No canonical tag in index.html" && exit 1)

          # Verify og:image is set
          grep -q 'og:image' dist/index.html || (echo "❌ No og:image in index.html" && exit 1)

          # Verify CSP meta tag (since _headers doesn't work on GitHub Pages)
          grep -q 'Content-Security-Policy' dist/index.html || (echo "❌ No CSP meta tag in index.html" && exit 1)

          echo "✅ All SEO checks passed"

      # Re-write CNAME after every Vite build (Vite clears dist/ each time)
      - name: Write CNAME
        run: echo "digitalizen.billah.dev" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
