# ============================================================
# .github/workflows/deploy.yml — Digitalizen 2026
# CI/CD: Build Vite SPA → Deploy to GitHub Pages
#
# Handles:
#   ● BrowserRouter clean URLs (404.html redirect included)
#   ● Automatic sitemap timestamp update
#   ● Cache busting via hash filenames (vite config)
#   ● Lighthouse CI audit (optional, uncomment to enable)
# ============================================================

name: 🚀 Deploy Digitalizen to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# ─── Permissions for GitHub Pages deployment ─────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ─── Prevent concurrent deployments ─────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1: Build
  # ═══════════════════════════════════════════════════════
  build:
    name: 🔨 Build Vite SPA
    runs-on: ubuntu-latest

    steps:
      # ── Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for sitemap lastmod

      # ── Setup Node.js ──
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ──
      - name: Install dependencies
        run: npm ci

      # ── Update sitemap lastmod with current date ──
      - name: Update sitemap lastmod
        run: |
          CURRENT_DATE=$(date -u +"%Y-%m-%d")
          sed -i "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>${CURRENT_DATE}<\/lastmod>/g" public/sitemap.xml
          echo "Sitemap updated: $CURRENT_DATE"

      # ── Build ──
      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      # ── Verify dist output ──
      - name: Verify build output
        run: |
          echo "=== dist/ structure ==="
          ls -la dist/
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ || echo "No assets folder"
          echo "=== Critical files ==="
          test -f dist/index.html && echo "✅ index.html" || echo "❌ index.html MISSING"
          test -f dist/sw.js && echo "✅ sw.js" || echo "⚠️  sw.js missing (check public/)"
          test -f dist/robots.txt && echo "✅ robots.txt" || echo "⚠️  robots.txt missing"
          test -f dist/sitemap.xml && echo "✅ sitemap.xml" || echo "⚠️  sitemap.xml missing"
          test -f dist/404.html && echo "✅ 404.html (BrowserRouter)" || echo "❌ 404.html MISSING"
          test -f dist/humans.txt && echo "✅ humans.txt" || echo "⚠️  humans.txt missing"

      # ── Upload build artifact ──
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ═══════════════════════════════════════════════════════
  # JOB 2: Deploy (only on main branch push)
  # ═══════════════════════════════════════════════════════
  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Success
        run: |
          echo "🚀 Deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "🇧🇩 Digitalizen is live — Bangladesh's #1 digital marketing agency"

  # ═══════════════════════════════════════════════════════
