# ============================================================
# .github/workflows/deploy-workers.yml
#
# Digitalizen — Cloudflare CAPI Workers Deploy
# ─────────────────────────────────────────────
# Triggers only when api/ files change.
# Deploys two Workers:
#   api/capi.js    → capi.digitalizen.billah.dev     (Meta CAPI)
#   api/tt-capi.js → tt-capi.digitalizen.billah.dev  (TikTok CAPI)
#
# SECRETS required in Repo → Settings → Secrets → Actions:
#   CLOUDFLARE_API_TOKEN   → Cloudflare Profile → API Tokens
#                            Template: "Edit Cloudflare Workers"
#   CLOUDFLARE_ACCOUNT_ID  → Cloudflare dashboard right sidebar
#
# WORKER SECRETS (set once locally, stored in Cloudflare):
#   wrangler secret put META_PIXEL_ID
#   wrangler secret put CAPI_ACCESS_TOKEN
#   wrangler secret put TT_PIXEL_ID     --config wrangler.tt-capi.toml
#   wrangler secret put TT_ACCESS_TOKEN --config wrangler.tt-capi.toml
# ============================================================

name: Deploy → Cloudflare Workers (CAPI)

on:
  push:
    branches: [main]
    paths:
      - 'api/capi.js'
      - 'api/tt-capi.js'
      - 'wrangler.toml'
      - 'wrangler.tt-capi.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workers-deploy
  cancel-in-progress: true

jobs:

  deploy-workers:
    name: Deploy Meta & TikTok CAPI Workers
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy Meta CAPI Worker
        uses: cloudflare/wrangler-action@392b948197e5a2f1c737f985a2af3cdbe45da91  # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.4'
          command: deploy --config wrangler.toml

      - name: Deploy TikTok CAPI Worker
        uses: cloudflare/wrangler-action@392b948197e5a2f1c737f985a2af3cdbe45da91  # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.4'
          command: deploy --config wrangler.tt-capi.toml

      - name: Wait for edge propagation
        run: sleep 8

      - name: Smoke test — Meta CAPI
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST https://capi.digitalizen.billah.dev \
            -H "Content-Type: application/json" \
            -d '{"event_name":"TestEvent","event_id":"ci_smoke_test"}')
          echo "Meta CAPI status: $STATUS"
          [ "$STATUS" = "000" ] && echo "❌ Unreachable" && exit 1
          echo "✅ Meta CAPI up (HTTP $STATUS)"

      - name: Smoke test — TikTok CAPI
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST https://tt-capi.digitalizen.billah.dev \
            -H "Content-Type: application/json" \
            -d '{"event_name":"TestEvent","event_id":"ci_smoke_test"}')
          echo "TikTok CAPI status: $STATUS"
          [ "$STATUS" = "000" ] && echo "❌ Unreachable" && exit 1
          echo "✅ TikTok CAPI up (HTTP $STATUS)"
