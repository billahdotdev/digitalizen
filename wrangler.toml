# ============================================================
# wrangler.toml — Meta CAPI Worker (PRIMARY config)
# ============================================================
# SETUP:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. Set secrets:
#        wrangler secret put META_PIXEL_ID
#        wrangler secret put CAPI_ACCESS_TOKEN
#   4. Deploy: wrangler deploy
#
# For TikTok CAPI Worker, use:
#   wrangler deploy --config wrangler.tt-capi.toml
#
# Docs: https://developers.cloudflare.com/workers/
# ============================================================

name                 = "digitalizen-capi"
main                 = "api/capi.js"
compatibility_date   = "2025-09-01"
compatibility_flags  = ["nodejs_compat"]

routes = [
  { pattern = "capi.digitalizen.billah.dev/*", zone_name = "digitalizen.billah.dev" }
]

[vars]
ALLOWED_ORIGIN = "https://digitalizen.billah.dev"

# Secrets — set via CLI, NEVER in this file:
#   wrangler secret put META_PIXEL_ID
#   wrangler secret put CAPI_ACCESS_TOKEN

[observability]
enabled = true
