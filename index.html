    <!-- ═════════════════════════════════════════════════════════════
         PRECONNECTS — shave 100-300ms on every third-party call.
         Order matters: Pixel & GA before fonts (analytics fires first).
    ═════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch"  href="https://wa.me" />

    <!-- ═════════════════════════════════════════════════════════════
         META PIXEL  ← REPLACE  YOUR_PIXEL_ID  before going live.
         Loaded EARLY (before fonts/GA) so PageView fires reliably,
         even when the user clicks the back button mid-load.
         Get ID: business.facebook.com → Events Manager → Pixel ID
    ═════════════════════════════════════════════════════════════ -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'YOUR_PIXEL_ID');
    fbq('track', 'PageView');
    </script>

    <!-- ═════════════════════════════════════════════════════════════
         GOOGLE ANALYTICS 4  ← REPLACE  G-XXXXXXXXXX
         Get it from: analytics.google.com → Admin → Data Streams → Web
    ═════════════════════════════════════════════════════════════ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
    </script>

    <!-- ══ FONTS — non-blocking (after analytics inits) ══ -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;700&display=swap" />

    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;700&display=swap" />
    </noscript>

    <!-- ══════════════════════════════════════════════════════════════
         GitHub Pages SPA fallback restorer
         404.html captures the path → sessionStorage → restored here
         BEFORE React mounts so /bot deep-links work on first paint.
    ══════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          history.replaceState(null, null, '/' + redirect);
        }
      })();
    </script>
